<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>FluxIT Crypto — Dashboard</title>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body { font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif; background:#0a0a0f; color:#e2e8f0; min-height:100vh; }

    nav { display:flex; justify-content:space-between; align-items:center; padding:16px 28px; border-bottom:1px solid #1e293b; background:rgba(10,10,15,0.95); position:sticky; top:0; z-index:100; }
    .logo { font-size:1.1rem; font-weight:700; color:#22d3ee; }
    .logo span { color:#fff; }
    .status-dot { display:inline-flex; align-items:center; gap:6px; font-size:0.8rem; color:#4ade80; }
    .dot { width:7px; height:7px; background:#4ade80; border-radius:50%; animation:pulse 2s infinite; }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }

    .container { max-width:1100px; margin:0 auto; padding:28px 20px; }

    h2 { font-size:1.5rem; font-weight:700; margin-bottom:6px; }
    .subtitle { color:#64748b; font-size:0.9rem; margin-bottom:28px; }

    /* CARDS */
    .cards { display:grid; grid-template-columns:repeat(auto-fit,minmax(200px,1fr)); gap:16px; margin-bottom:28px; }
    .card { background:#0f172a; border:1px solid #1e293b; border-radius:14px; padding:22px; }
    .card-label { font-size:0.78rem; color:#64748b; text-transform:uppercase; letter-spacing:0.5px; margin-bottom:8px; }
    .card-value { font-size:1.7rem; font-weight:800; }
    .card-sub { font-size:0.82rem; color:#64748b; margin-top:4px; }
    .green { color:#4ade80; }
    .red { color:#f87171; }

    /* TABLE */
    .table-wrap { background:#0f172a; border:1px solid #1e293b; border-radius:14px; overflow:hidden; margin-bottom:28px; }
    .table-header { padding:18px 22px; border-bottom:1px solid #1e293b; display:flex; justify-content:space-between; align-items:center; }
    .table-header h3 { font-size:0.95rem; font-weight:700; }
    table { width:100%; border-collapse:collapse; }
    th { padding:12px 20px; text-align:left; font-size:0.78rem; color:#64748b; text-transform:uppercase; letter-spacing:0.5px; border-bottom:1px solid #1e293b; }
    td { padding:14px 20px; font-size:0.9rem; border-bottom:1px solid #0a0a0f; }
    tr:last-child td { border-bottom:none; }
    tr:hover td { background:rgba(255,255,255,0.02); }
    .symbol { font-weight:700; }
    .pill { display:inline-block; padding:3px 10px; border-radius:100px; font-size:0.75rem; font-weight:600; }
    .pill.buy { background:rgba(74,222,128,0.1); color:#4ade80; }
    .pill.sell { background:rgba(248,113,113,0.1); color:#f87171; }
    .pill.active { background:rgba(34,211,238,0.1); color:#22d3ee; }

    /* LOADING */
    .loading { text-align:center; padding:60px; color:#334155; }
    .spinner { width:32px; height:32px; border:3px solid #1e293b; border-top-color:#22d3ee; border-radius:50%; animation:spin 0.8s linear infinite; margin:0 auto 16px; }
    @keyframes spin { to { transform:rotate(360deg); } }

    .refresh-btn { background:transparent; border:1px solid #334155; color:#94a3b8; padding:8px 16px; border-radius:8px; cursor:pointer; font-size:0.82rem; transition:all 0.2s; }
    .refresh-btn:hover { border-color:#22d3ee; color:#22d3ee; }

    .updated { font-size:0.78rem; color:#334155; }

    @media(max-width:600px) { th,td { padding:10px 12px; } .cards { grid-template-columns:1fr 1fr; } }
  </style>
</head>
<body>

<nav>
  <div class="logo">FluxIT <span>Crypto</span></div>
  <div class="status-dot"><span class="dot"></span> En vivo</div>
</nav>

<div class="container">
  <h2>Dashboard</h2>
  <p class="subtitle">Paper Trading — actualización automática cada 30s</p>

  <div id="app">
    <div class="loading"><div class="spinner"></div>Cargando datos...</div>
  </div>
</div>

<script>
  let lastUpdate = null;

  async function load() {
    try {
      const res = await fetch('/api/dashboard');
      const data = await res.json();
      render(data);
      lastUpdate = new Date();
    } catch(e) {
      document.getElementById('app').innerHTML =
        '<div class="loading" style="color:#f87171">Error cargando datos. Reintentando...</div>';
    }
  }

  function pnlClass(v) { return v >= 0 ? 'green' : 'red'; }
  function sign(v) { return v >= 0 ? '+' : ''; }
  function fmt(v) { return v >= 1 ? v.toLocaleString('es',{minimumFractionDigits:2,maximumFractionDigits:2}) : v.toFixed(6); }

  function render(d) {
    const pnl = d.total - 10000;
    const pnlPct = (pnl / 10000 * 100);

    let posRows = '';
    for (const p of d.positions) {
      const pnlVal = p.value - p.invested;
      const pnlP = p.invested > 0 ? (pnlVal/p.invested*100) : 0;
      const sl = p.stop_loss ? `$${fmt(p.stop_loss)}` : '—';
      const tp = p.take_profit ? `$${fmt(p.take_profit)}` : '—';
      posRows += `<tr>
        <td><span class="symbol">${p.symbol}</span></td>
        <td>${p.quantity.toFixed(6)}</td>
        <td>$${fmt(p.current_price)}</td>
        <td>$${fmt(p.avg_entry)}</td>
        <td>$${fmt(p.value)}</td>
        <td class="${pnlClass(pnlVal)}">${sign(pnlVal)}$${fmt(Math.abs(pnlVal))} (${sign(pnlP)}${pnlP.toFixed(2)}%)</td>
        <td><span style="color:#f87171">${sl}</span></td>
        <td><span style="color:#4ade80">${tp}</span></td>
      </tr>`;
    }
    if (!posRows) posRows = '<tr><td colspan="8" style="text-align:center;color:#334155;padding:32px">Sin posiciones abiertas</td></tr>';

    let tradeRows = '';
    for (const t of d.recent_trades.slice(0,8)) {
      const side = t.side === 'BUY' ? 'buy' : 'sell';
      tradeRows += `<tr>
        <td><span class="symbol">${t.symbol}</span></td>
        <td><span class="pill ${side}">${t.side}</span></td>
        <td>${parseFloat(t.quantity).toFixed(6)}</td>
        <td>$${fmt(parseFloat(t.price))}</td>
        <td>$${fmt(parseFloat(t.total_usdt))}</td>
        <td style="color:#475569">${t.timestamp.slice(0,16).replace('T',' ')}</td>
      </tr>`;
    }
    if (!tradeRows) tradeRows = '<tr><td colspan="6" style="text-align:center;color:#334155;padding:32px">Sin operaciones aún</td></tr>';

    document.getElementById('app').innerHTML = `
      <div class="cards">
        <div class="card">
          <div class="card-label">💵 USDT disponible</div>
          <div class="card-value">$${d.usdt.toLocaleString('es',{minimumFractionDigits:2,maximumFractionDigits:2})}</div>
        </div>
        <div class="card">
          <div class="card-label">📊 En cripto</div>
          <div class="card-value">$${d.crypto_value.toLocaleString('es',{minimumFractionDigits:2,maximumFractionDigits:2})}</div>
        </div>
        <div class="card">
          <div class="card-label">💰 Total portfolio</div>
          <div class="card-value">$${d.total.toLocaleString('es',{minimumFractionDigits:2,maximumFractionDigits:2})}</div>
          <div class="card-sub">Inicial: $10,000.00</div>
        </div>
        <div class="card">
          <div class="card-label">📈 PnL total</div>
          <div class="card-value ${pnlClass(pnl)}">${sign(pnl)}$${fmt(Math.abs(pnl))}</div>
          <div class="card-sub ${pnlClass(pnl)}">${sign(pnlPct)}${pnlPct.toFixed(2)}%</div>
        </div>
      </div>

      <div class="table-wrap">
        <div class="table-header">
          <h3>📍 Posiciones abiertas</h3>
          <button class="refresh-btn" onclick="load()">🔄 Actualizar</button>
        </div>
        <table>
          <thead><tr>
            <th>Par</th><th>Cantidad</th><th>Precio actual</th>
            <th>Entrada media</th><th>Valor</th><th>PnL</th>
            <th>Stop Loss</th><th>Take Profit</th>
          </tr></thead>
          <tbody>${posRows}</tbody>
        </table>
      </div>

      <div class="table-wrap">
        <div class="table-header"><h3>📋 Últimas operaciones</h3></div>
        <table>
          <thead><tr><th>Par</th><th>Tipo</th><th>Cantidad</th><th>Precio</th><th>Total</th><th>Fecha</th></tr></thead>
          <tbody>${tradeRows}</tbody>
        </table>
      </div>

      <p class="updated">Actualizado: ${new Date().toLocaleTimeString('es')}</p>
    `;
  }

  load();
  setInterval(load, 30000);
</script>
</body>
</html>
